<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sign In · Lahza</title>
<meta name="theme-color" content="#100C0A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#100C0A;--surface:#1C1713;--gold:#E7B45A;--ink:#F6F0E6;--ink60:rgba(246,240,230,.6);--ink25:rgba(246,240,230,.25);--line:rgba(246,240,230,.08)}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.card{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo-mark{width:68px;height:68px;border-radius:20px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(231,180,90,.3)}
h1{font-size:23px;font-weight:800;letter-spacing:-.5px;text-align:center}
.sub{font-size:14px;color:var(--ink60);text-align:center;line-height:1.55;margin-top:-14px}
.event-badge{background:var(--surface);border:1px solid rgba(246,240,230,.1);border-radius:999px;padding:8px 18px;font-size:13px;color:var(--ink60);margin-top:-8px}
.event-badge b{color:var(--ink);font-style:italic}
.btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:4px}
.btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;height:54px;border-radius:999px;font-size:15.5px;font-weight:700;cursor:pointer;border:1px solid rgba(246,240,230,.15);background:var(--surface);color:var(--ink);transition:opacity .15s;letter-spacing:-.2px;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:active{opacity:.72}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-icon{width:22px;height:22px;flex-shrink:0}
.note{font-size:11.5px;color:var(--ink25);text-align:center;line-height:1.65;padding:0 8px}
.spinner{width:22px;height:22px;border:2px solid rgba(246,240,230,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.checking{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--ink60);font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="lang-toggle" style="position:fixed;top:14px;right:14px;z-index:50">
  <button data-lang-btn="en" onclick="LahzaI18N.set('en')">EN</button>
  <button data-lang-btn="tr" onclick="LahzaI18N.set('tr')">TR</button>
</div>

<div class="card" id="checking-view">
  <div class="checking">
    <div class="spinner"></div>
    <span data-i18n="auth.checking">Checking session…</span>
  </div>
</div>

<div class="card hidden" id="signin-view">
  <div class="logo-mark">📷</div>
  <h1 data-i18n="auth.title">Join the moment</h1>
  <p class="sub" data-i18n="auth.sub">Sign in to take photos for this event. Your shots are saved to the shared gallery.</p>
  <div class="event-badge"><span data-i18n="auth.joining">Joining</span> <b id="ename-label">the event</b></div>
  <div class="btns">
    <button class="btn" id="google-btn" onclick="signIn('google')">
      <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span data-i18n="auth.google">Continue with Google</span>
    </button>
    <button class="btn" id="apple-btn" onclick="signIn('apple')">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="var(--ink)" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      <span data-i18n="auth.apple">Continue with Apple</span>
    </button>
  </div>
  <p class="note" data-i18n-html="auth.note">By continuing you agree to share your photos in the event gallery and accept our <a href="terms.html" style="color:var(--ink60);text-decoration:underline">Terms</a> &amp; <a href="privacy.html" style="color:var(--ink60);text-decoration:underline">Privacy Policy</a>. We only use your account to link your contributions.</p>
</div>

<script src="js/i18n.js"></script>
<script>
const SUPA = 'https://qmbnjgtkwsggfoefgvvg.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtYm5qZ3Rrd3NnZ2ZvZWZndnZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjI4MjgsImV4cCI6MjA5NjIzODgyOH0.ABMprDSnHwGdOfeDB16_J-f8Hr_ZXqLOMufYsIemXCc';
const sb = supabase.createClient(SUPA, ANON);

const params = new URLSearchParams(location.search);
const slug  = params.get('slug') || sessionStorage.getItem('lahza_slug') || '';
const ename = params.get('name') || sessionStorage.getItem('lahza_name') || '';

(async function init() {
  if (params.get('slug')) sessionStorage.setItem('lahza_slug', slug);
  if (params.get('name')) sessionStorage.setItem('lahza_name', ename);

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const dest = sessionStorage.getItem('lahza_slug') || slug;
      if (dest) {
        location.replace('camera.html?slug=' + encodeURIComponent(dest) + '&from=auth');
      } else {
        showSignIn();
      }
      return;
    }
  } catch (_) {}

  showSignIn();
})();

function showSignIn() {
  document.getElementById('ename-label').textContent = ename || (window.LahzaI18N ? LahzaI18N.t('auth.theEvent') : 'the event');
  document.getElementById('checking-view').classList.add('hidden');
  document.getElementById('signin-view').classList.remove('hidden');
}

async function signIn(provider) {
  const btns = document.querySelectorAll('.btn');
  btns.forEach(b => b.disabled = true);
  try {
    await sb.auth.signInWithOAuth({
      provider,
      options: { redirectTo: location.origin + '/auth.html' + (slug ? '?slug=' + encodeURIComponent(slug) : '') }
    });
  } catch (e) {
    btns.forEach(b => b.disabled = false);
    alert(window.LahzaI18N ? LahzaI18N.t('auth.failed') : 'Sign-in failed. Please try again.');
  }
}
</script>
</body>
</html>
